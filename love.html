<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Love Letter 💌</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      position: relative;
    }

    h1 {
      color: #ff4d6d;
    }

    .buttons {
      margin-top: 30px;
      position: relative;
      height: 100px;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      position: absolute;
      transition: 0.2s;
    }

    #yesBtn {
      background-color: #28a745;
      color: white;
      left: 30%;
    }

    #noBtn {
      background-color: #dc3545;
      color: white;
      left: 55%;
    }

    .hidden {
      display: none;
    }

    .message {
      font-size: 24px;
      color: #ff4d6d;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Love ko nimo baby? 💖</h1>

    <div class="buttons">
        <a href="letter.html" class="buttons">pislita ko after yes</a> <br><br><br><br>
      <button id="yesBtn">Yes 💕</button>
      <button id="noBtn">No 😢</button>
     
    </div>

    <div id="result" class="message hidden"></div>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const result = document.getElementById("result");

    // Move "No" button randomly when hovered
    noBtn.addEventListener("mouseover", () => {
      const container = document.querySelector(".buttons");

      const maxX = container.clientWidth - noBtn.offsetWidth;
      const maxY = container.clientHeight - noBtn.offsetHeight;

      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;

      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    });

    // When "Yes" is clicked
    yesBtn.addEventListener("click", () => {
      result.classList.remove("hidden");
      result.innerHTML = "Awwww 🥰 I love you too!! 💖";
    });
  </script>

</body>
</html>
